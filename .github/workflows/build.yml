name: build-redbull-ksu-susfs
# KernelSU (classic v0.9.5, last non-GKI) + SuSFS for Pixel 4a 5G (bramble) / Pixel 5 (redfin) = redbull, kernel 4.19.
# Output: AnyKernel3.zip + Image.lz4-dtb. Tuned for stock Android-12 SQ3A.220705.003.A1.
on:
  workflow_dispatch:
    inputs:
      manifest_branch:
        description: "redbull kernel manifest branch (match device Android version)"
        required: true
        default: "android-msm-redbull-4.19-android12"
      susfs_branch:
        description: "susfs4ksu branch"
        required: true
        default: "kernel-4.19"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with: { tool-cache: true, android: false, dotnet: true, haskell: true, large-packages: true, docker-images: true, swap-storage: false }

      - name: Install deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y repo git bc bison build-essential curl flex libssl-dev libelf-dev zip kmod cpio python3 rsync ccache

      - name: Sync redbull kernel source
        run: |
          mkdir -p $HOME/android-kernel && cd $HOME/android-kernel
          git config --global user.email ci@local; git config --global user.name ci
          repo init --depth=1 -u https://android.googlesource.com/kernel/manifest -b ${{ github.event.inputs.manifest_branch }}
          repo sync -j$(nproc) -c --no-tags --no-clone-bundle
          # === PIN to the device's EXACT kernel commit ===
          # Device SQ3A.220705.003.A1 runs 4.19.224-g9e23c2625924-ab8577203; vendor /vendor/lib/modules/*.ko are
          # vermagic-locked to it. The branch tip is the stale 4.19.191 (Sep 2021) -> wrong version -> modules
          # rejected -> BOOTLOOP. Fetch+checkout the device commit (it's newer than branch tip, fetch by SHA).
          cd private/msm-google
          DEV_SHA=9e23c2625924
          git fetch --depth=1 origin "$DEV_SHA" 2>/dev/null && git checkout -q FETCH_HEAD || {
            echo "fetch-by-sha failed; unshallowing full history"; git fetch --unshallow 2>/dev/null || git fetch --depth=20000 origin; git checkout -q "$DEV_SHA"; }
          KV=$(make kernelversion 2>/dev/null); echo "kernelversion=$KV"; git --no-pager log -1 --oneline || true
          case "$KV" in 4.19.224) echo "OK pinned 4.19.224";; *) echo "::error::expected 4.19.224 got '$KV' (commit $DEV_SHA not checked out) — aborting"; exit 1;; esac
          # Force vermagic EXACTLY 4.19.224-g9e23c2625924-ab8577203 so KSU/SuSFS edits don't make it -dirty and
          # the string matches the vendor .ko vermagic (setlocalversion uses .scmversion verbatim).
          printf -- '-g9e23c2625924-ab8577203' > .scmversion
          cd "$HOME/android-kernel"
          echo "KROOT=$HOME/android-kernel/private/msm-google" >> $GITHUB_ENV

      - name: Integrate KernelSU (classic v0.9.5, non-GKI) + verify wiring
        run: |
          cd "$KROOT"
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/v0.9.5/kernel/setup.sh" | bash -s v0.9.5 || true
          # ensure Kconfig/Makefile wiring (non-GKI manual fallback)
          grep -q 'drivers/kernelsu/Kconfig' drivers/Kconfig || sed -i '/menu "Device Drivers"/a source "drivers/kernelsu/Kconfig"' drivers/Kconfig || true
          grep -q 'kernelsu' drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          if [ ! -e drivers/kernelsu ]; then ln -sf ../KernelSU/kernel drivers/kernelsu; fi
          echo "--- KSU wiring ---"; grep -n kernelsu drivers/Makefile drivers/Kconfig || true
          ls -la KernelSU drivers/kernelsu 2>/dev/null || true

      - name: Apply SuSFS (susfs4ksu ${{ github.event.inputs.susfs_branch }})
        run: |
          cd "$KROOT"
          git clone --depth=1 -b ${{ github.event.inputs.susfs_branch }} https://gitlab.com/simonpunk/susfs4ksu.git /tmp/susfs
          cp /tmp/susfs/kernel_patches/fs/susfs.c fs/ 2>&1 || true
          cp /tmp/susfs/kernel_patches/fs/sus_su.c fs/ 2>&1 || true
          cp /tmp/susfs/kernel_patches/include/linux/susfs.h include/linux/ 2>&1 || true
          cp /tmp/susfs/kernel_patches/include/linux/susfs_def.h include/linux/ 2>&1 || true
          cp /tmp/susfs/kernel_patches/include/linux/sus_su.h include/linux/ 2>&1 || true
          echo "=== kernel-side susfs patch (no fuzz: let incompatible hunks reject cleanly -> stock files compile) ==="
          patch -p1 --no-backup-if-mismatch < /tmp/susfs/kernel_patches/50_add_susfs_in_kernel-4.19.patch || echo "WARN kernel patch hunks rejected (see *.rej)"
          echo "=== KSU-side susfs patch (fuzz: must land the selinux susfs_*_sid DEFINITIONS hunk) ==="
          ( cd KernelSU && patch -p1 -F3 --no-backup-if-mismatch < /tmp/susfs/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ) || echo "WARN ksu patch hunks rejected"
          echo "=== verify susfs selinux definitions present ==="
          grep -rn "susfs_set_ksu_sid\|susfs_is_current_ksu_domain" KernelSU/kernel/selinux/ | head || echo "MISSING susfs selinux defs"
          echo "=== rejected hunks ==="; find . -name '*.rej' || true
          # OPTION-2: define the 6 susfs selinux-domain symbols as STUB no-ops. The REAL defs call
          # SELinux internals (security_secctx_to_secid/current_sid) that NULL-deref/PANIC at early
          # boot on the pinned 4.19.224 source -> bootloop. Stubs link fine; core sus_path/sus_mount/
          # try_umount hiding is unaffected. Marker-guarded so it ALWAYS injects (patch adds only CALLS).
          SX=KernelSU/kernel/selinux/selinux.c
          if ! grep -q 'susfs selinux-domain STUBS' "$SX"; then echo "" | base64 -d >> "$SX"; fi
          grep -n "susfs_set_ksu_sid\|susfs_is_current_ksu_domain" "$SX" | head
          find . -name '*.rej' -print -exec sed -n '1,5p' {} \; 2>/dev/null | head -40 || true

      - name: Configure defconfig + DISABLE check_defconfig
        run: |
          cd $HOME/android-kernel
          DC="$KROOT/arch/arm64/configs/redbull_defconfig"
          # (KMI/ABI post-build compare is tolerated via continue-on-error on the Build step; image is produced before it runs)
          # Use THIN LTO (not none): keeps CFI/KMI intact so stock vendor modules load (device BOOTS),
          # while using far less RAM than full LTO (which OOM'd the runner). Full-LTO -> Thin-LTO.
          sed -i 's/^CONFIG_LTO_CLANG_FULL=y/# CONFIG_LTO_CLANG_FULL is not set/' "$DC"
          { echo "CONFIG_LTO_CLANG=y"; echo "CONFIG_THINLTO=y"; echo "CONFIG_LTO_CLANG_THIN=y"; echo "CONFIG_CFI_CLANG=y"; } >> "$DC"
          echo "--- LTO/CFI config lines ---"; grep -nE "LTO|THINLTO|CFI" "$DC" || true
          # bulletproof: kill the whole 'eval ${POST_DEFCONFIG_CMDS}' line in build.sh (it ran check_defconfig && update_config and aborted)
          echo "before:"; grep -nE "eval .*POST_DEFCONFIG_CMDS" build/build.sh || true
          sed -i '/eval .*POST_DEFCONFIG_CMDS/c\POST_DEFCONFIG_CMDS=true' build/build.sh
          echo "after:"; grep -nE "POST_DEFCONFIG_CMDS" build/build.sh | head
          DC="$KROOT/arch/arm64/configs/redbull_defconfig"
          for c in CONFIG_KSU=y CONFIG_KSU_SUSFS=y CONFIG_KSU_SUSFS_SUS_PATH=y CONFIG_KSU_SUSFS_SUS_MOUNT=y \
                   CONFIG_KSU_SUSFS_TRY_UMOUNT=y CONFIG_KSU_SUSFS_SPOOF_UNAME=y CONFIG_KSU_SUSFS_SUS_KSTAT=y \
                   CONFIG_KSU_SUSFS_SPOOF_PROC_CMDLINE=y CONFIG_KSU_SUSFS_OPEN_REDIRECT=y CONFIG_TMPFS_XATTR=y; do
            echo "$c" >> "$DC"; done
          echo "--- tail defconfig ---"; tail -12 "$DC"

      - name: Build
        continue-on-error: true
        run: |
          cd $HOME/android-kernel
          export LTO=thin
          BUILD_CONFIG=private/msm-google/build.config.redbull.vintf build/build.sh

      - name: Locate image
        id: img
        run: |
          IMG=$(find $HOME/android-kernel/out -name 'Image.lz4-dtb' -o -name 'Image.lz4' -o -name 'Image' | head -1)
          echo "found=$IMG"; echo "path=$IMG" >> $GITHUB_OUTPUT
          [ -n "$IMG" ] || { echo "NO KERNEL IMAGE BUILT"; exit 1; }

      - name: Package AnyKernel3
        run: |
          cd $HOME/android-kernel
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g; s/is_slot_device=0;/is_slot_device=auto;/g' AnyKernel3/anykernel.sh
          sed -i 's!block=/dev/block/platform/.*/by-name/boot;!block=auto;!g' AnyKernel3/anykernel.sh
          cp "${{ steps.img.outputs.path }}" AnyKernel3/
          cd AnyKernel3 && zip -r9 AnyKernel3.zip . -x ".git*" "README.md" "*.zip"

      - name: Upload AnyKernel3
        if: success()
        uses: actions/upload-artifact@v4
        with: { name: AnyKernel3-redbull-ksu-susfs, path: /home/runner/android-kernel/AnyKernel3/AnyKernel3.zip }
      - name: Upload raw image
        if: success()
        uses: actions/upload-artifact@v4
        with: { name: kernel-image, path: "${{ steps.img.outputs.path }}" }
